name: JSON Validation
on:
  push:
    paths:
      - 'sections.json'
  pull_request:
    paths:
      - 'sections.json'

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 -c "import json; json.load(open('sections.json'))"
