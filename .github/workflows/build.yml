name: Build and Deploy AI News Digest

on:
  push:
    branches: [main]
  schedule:
    # Morning: 15:00 UTC
    - cron: "0 15 * * *"
    # Afternoon: 20:00 UTC
    - cron: "0 20 * * *"
    # Evening: 00:00 UTC
    - cron: "0 0 * * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: ${{ hashFiles('Gemfile.lock') }}

      - name: Install dependencies
        run: bundle install

      - name: Generate news digest (${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }})
        run: |
          EDITION="${{ github.event_name == 'schedule' && 'auto' || 'manual' }}"
          python3 generate_news.py "$EDITION" .

      - name: Build site
        run: bundle exec jekyll build --destination _site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
